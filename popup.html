<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 4px 0;
      color: #fff;
    }
    .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #7c83ff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background: #7c83ff;
    }
    .toggle input:checked + .slider:before {
      transform: translateX(20px);
    }
    .saved {
      color: #4caf50;
      font-size: 12px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
    .link {
      display: block;
      margin-top: 12px;
      color: #7c83ff;
      font-size: 11px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>🎬 GifDict</h1>
  <div class="subtitle">Double-click any word → see it in a GIF</div>

  <label>Giphy API Key</label>
  <input type="text" id="apiKey" placeholder="Paste your Giphy API key here">

  <div class="toggle-row">
    <span>Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="saved" id="saved">✓ Saved</div>

  <a class="link" href="https://developers.giphy.com/" target="_blank">Get a free Giphy API key →</a>

  <script src="popup.js"></script>
</body>
</html>
